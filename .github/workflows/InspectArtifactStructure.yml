name: POC - Inspect Country Artifact Structure

on:
  workflow_dispatch:
    inputs:
      country:
        description: 'Country code to inspect'
        required: false
        default: 'de'

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Install bccontainerhelper
        shell: pwsh
        run: |
          Install-Module bccontainerhelper -force
          Import-Module bccontainerhelper

      - name: Get artifact URL and list top-level folders
        shell: pwsh
        env:
          COUNTRY: ${{ github.event.inputs.country }}
        run: |
          Import-Module bccontainerhelper
          $country = $env:COUNTRY
          if ([string]::IsNullOrEmpty($country)) { $country = 'de' }

          $url = Get-BCArtifactUrl -select Latest -Type Sandbox -country $country
          Write-Host "Artifact URL ($country): $url"

          $path = Download-Artifacts -artifactUrl $url
          Write-Host ""
          Write-Host "=== Top-level entries under downloaded artifact path ($path) ==="
          Get-ChildItem -Path $path | ForEach-Object { Write-Host " - $($_.Name) [$(if ($_.PSIsContainer) {'dir'} else {'file'})]" }

          Write-Host ""
          Write-Host "=== Files directly under Applications.$($country.ToUpper()) ==="
          $appsCountry = Join-Path $path "Applications.$($country.ToUpper())"
          if (Test-Path $appsCountry) {
              Get-ChildItem -Path $appsCountry -Recurse | Sort-Object Name | ForEach-Object { Write-Host " - $($_.FullName.Replace($path,'')) [$(if ($_.PSIsContainer) {'dir'} else {'file'})]" }
          } else {
              Write-Host "  (folder not found)"
          }

          Write-Host ""
          Write-Host "=== Files directly under Extensions ==="
          $extPath = Join-Path $path "Extensions"
          if (Test-Path $extPath) {
              Get-ChildItem -Path $extPath -Recurse | Sort-Object Name | ForEach-Object { Write-Host " - $($_.FullName.Replace($path,'')) [$(if ($_.PSIsContainer) {'dir'} else {'file'})]" }
          } else {
              Write-Host "  (folder not found)"
          }

          Write-Host ""
          Write-Host "=== Files directly under ConfigurationPackages ==="
          $cfgPath = Join-Path $path "ConfigurationPackages"
          if (Test-Path $cfgPath) {
              Get-ChildItem -Path $cfgPath -Recurse | Sort-Object Name | ForEach-Object { Write-Host " - $($_.FullName.Replace($path,'')) [$(if ($_.PSIsContainer) {'dir'} else {'file'})]" }
          } else {
              Write-Host "  (folder not found)"
          }

          Write-Host ""
          Write-Host "=== Searching entire artifact tree (files+dirs) for 'Subscription Billing' / 'Sustainability' ==="
          Get-ChildItem -Path $path -Recurse -Filter "*Subscription Billing*" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "FOUND: $($_.FullName) [$(if ($_.PSIsContainer) {'dir'} else {'file'})]" }
          Get-ChildItem -Path $path -Recurse -Filter "*Sustainability*" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "FOUND: $($_.FullName) [$(if ($_.PSIsContainer) {'dir'} else {'file'})]" }

          Flush-ContainerHelperCache -keepDays 0 -ErrorAction SilentlyContinue
