name: Test Download Speed - Range Requests vs Full Download

on:
  workflow_dispatch:

jobs:
  benchmark-download:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y aria2 p7zip-full

      - name: Install bccontainerhelper
        shell: pwsh
        run: |
          Install-Module bccontainerhelper -force -AllowPrerelease
          Import-Module bccontainerhelper

      - name: Get artifact URL
        id: url
        shell: pwsh
        run: |
          $url = Get-BCArtifactUrl -select Latest -Type Sandbox -country de
          Write-Host "Artifact URL: $url"
          "url=$url" >> $env:GITHUB_OUTPUT

          # HEAD request to get total size and verify Range support
          $response = Invoke-WebRequest -Uri $url -Method Head -UseBasicParsing
          $totalSize = [long]($response.Headers['Content-Length'] | Select-Object -First 1)
          $acceptRanges = $response.Headers['Accept-Ranges'] | Select-Object -First 1
          Write-Host "Total size: $([math]::Round($totalSize / 1MB)) MB"
          Write-Host "Accept-Ranges: $acceptRanges"
          "totalSize=$totalSize" >> $env:GITHUB_OUTPUT

      - name: "Benchmark 1: Full download via Download-Artifacts"
        shell: pwsh
        run: |
          Import-Module bccontainerhelper
          $url = "${{ steps.url.outputs.url }}"

          Write-Host "=== Full download via Download-Artifacts ==="
          Write-Host "URL: $url"

          Flush-ContainerHelperCache -keepDays 0 -ErrorAction SilentlyContinue

          $sw = [System.Diagnostics.Stopwatch]::StartNew()
          $path = Download-Artifacts -artifactUrl $url
          $sw.Stop()

          Write-Host "Time: $($sw.Elapsed.ToString())"
          Write-Host "Path: $path"

          $totalSize = (Get-ChildItem -Path $path -Recurse | Measure-Object -Property Length -Sum).Sum
          Write-Host "Extracted size: $([math]::Round($totalSize / 1MB)) MB"

          # Check Applications.DE folder
          $appsDE = Join-Path $path "Applications.DE"
          if (Test-Path $appsDE) {
              $appsSize = (Get-ChildItem -Path $appsDE -Recurse | Measure-Object -Property Length -Sum).Sum
              Write-Host "Applications.DE size: $([math]::Round($appsSize / 1MB)) MB"
              $sourceZips = Get-ChildItem -Path $appsDE -Recurse -Filter "*.Source.zip"
              Write-Host "Source ZIPs: $($sourceZips.Count) files, $([math]::Round(($sourceZips | Measure-Object -Property Length -Sum).Sum / 1MB)) MB"
          }

          Flush-ContainerHelperCache -keepDays 0 -ErrorAction SilentlyContinue

      - name: "Benchmark 2: Range request - download only Applications.DE"
        shell: bash
        env:
          ARTIFACT_URL: ${{ steps.url.outputs.url }}
          TOTAL_SIZE: ${{ steps.url.outputs.totalSize }}
        run: |
          set -e
          URL="$ARTIFACT_URL"
          TOTAL_SIZE="$TOTAL_SIZE"
          WORK_DIR="/tmp/range-test"
          mkdir -p "$WORK_DIR"

          echo "=== Range request - download only Applications.DE ==="
          echo "URL: $URL"
          echo "Total archive size: $((TOTAL_SIZE / 1048576)) MB"

          OVERALL_START=$(date +%s%N)

          # Step 1: Download last 64KB to read ZIP central directory
          echo ""
          echo "--- Step 1: Download ZIP central directory (last 64KB) ---"
          TAIL_START=$((TOTAL_SIZE - 65536))
          STEP_START=$(date +%s%N)
          curl -s -o "$WORK_DIR/tail.bin" -r "${TAIL_START}-${TOTAL_SIZE}" "$URL"
          STEP_END=$(date +%s%N)
          TAIL_SIZE=$(stat -c%s "$WORK_DIR/tail.bin")
          echo "Downloaded $TAIL_SIZE bytes in $(( (STEP_END - STEP_START) / 1000000 ))ms"

          # Step 2: Parse ZIP central directory using Python (reliable binary parsing)
          echo ""
          echo "--- Step 2: Parse ZIP central directory ---"
          python3 << 'PYEOF'
          import struct, sys, os, json

          url = os.environ['ARTIFACT_URL']
          total_size = int(os.environ['TOTAL_SIZE'])
          work_dir = "/tmp/range-test"

          with open(f"{work_dir}/tail.bin", "rb") as f:
              tail = f.read()

          # Find EOCD signature scanning backwards
          eocd_sig = b'\x50\x4b\x05\x06'
          eocd_pos = tail.rfind(eocd_sig)
          if eocd_pos == -1:
              print("ERROR: Could not find EOCD signature")
              sys.exit(1)

          entry_count = struct.unpack_from('<H', tail, eocd_pos + 10)[0]
          cd_size = struct.unpack_from('<I', tail, eocd_pos + 12)[0]
          cd_offset = struct.unpack_from('<I', tail, eocd_pos + 16)[0]
          print(f"Central directory: {entry_count} entries, {cd_size // 1024} KB at offset {cd_offset}")

          # Check if central directory is in our tail
          cd_start_in_tail = len(tail) - (total_size - cd_offset)
          if cd_start_in_tail < 0:
              print(f"Need to download central directory separately (starts at {cd_offset})")
              import subprocess
              subprocess.run([
                  "curl", "-s", "-o", f"{work_dir}/cd.bin",
                  "-r", f"{cd_offset}-{total_size - 1}", url
              ], check=True)
              with open(f"{work_dir}/cd.bin", "rb") as f:
                  tail = f.read()
              cd_start_in_tail = 0

          # Parse central directory entries
          entries = []
          pos = cd_start_in_tail
          for _ in range(entry_count):
              sig = tail[pos:pos+4]
              if sig != b'\x50\x4b\x01\x02':
                  print(f"WARNING: Invalid CD entry at pos {pos}")
                  break
              comp_size = struct.unpack_from('<I', tail, pos + 20)[0]
              uncomp_size = struct.unpack_from('<I', tail, pos + 24)[0]
              name_len = struct.unpack_from('<H', tail, pos + 28)[0]
              extra_len = struct.unpack_from('<H', tail, pos + 30)[0]
              comment_len = struct.unpack_from('<H', tail, pos + 32)[0]
              local_offset = struct.unpack_from('<I', tail, pos + 42)[0]
              name = tail[pos+46:pos+46+name_len].decode('utf-8')
              entries.append({
                  'name': name,
                  'comp_size': comp_size,
                  'uncomp_size': uncomp_size,
                  'offset': local_offset
              })
              pos += 46 + name_len + extra_len + comment_len

          print(f"Parsed {len(entries)} entries")

          # Find Applications.DE entries
          app_entries = [e for e in entries if e['name'].startswith('Applications.DE/') and e['comp_size'] > 0]
          print(f"Applications.DE entries: {len(app_entries)} files")

          if not app_entries:
              print("ERROR: No Applications.DE entries found")
              sys.exit(1)

          # Find contiguous byte range
          first_offset = min(e['offset'] for e in app_entries)

          # Find the actual end by checking all entries in the range
          all_in_range = sorted([e for e in entries if e['offset'] >= first_offset and
                                  e['offset'] <= max(e['offset'] for e in app_entries)],
                                 key=lambda e: e['offset'])

          range_end = 0
          for e in all_in_range:
              # local header (30) + name + extra (estimate 64) + compressed data
              entry_end = e['offset'] + 30 + len(e['name']) + 64 + e['comp_size']
              range_end = max(range_end, entry_end)

          download_size = range_end - first_offset
          app_comp_total = sum(e['comp_size'] for e in app_entries)
          app_uncomp_total = sum(e['uncomp_size'] for e in app_entries)
          savings = round((1 - download_size / total_size) * 100)

          print(f"Byte range: {first_offset} - {range_end}")
          print(f"Range size: {download_size // 1048576} MB")
          print(f"Savings vs full: {savings}%")
          print(f"Applications.DE compressed: {app_comp_total // 1048576} MB")
          print(f"Applications.DE uncompressed: {app_uncomp_total // 1048576} MB")

          # Write range info for bash to use
          with open(f"{work_dir}/range_info.json", "w") as f:
              json.dump({
                  'first_offset': first_offset,
                  'range_end': range_end,
                  'download_size': download_size,
                  'app_entries': app_entries
              }, f)
          PYEOF

          # Step 3: Download just the Applications.DE range
          echo ""
          echo "--- Step 3: Download Applications.DE range ---"
          FIRST_OFFSET=$(python3 -c "import json; d=json.load(open('/tmp/range-test/range_info.json')); print(d['first_offset'])")
          RANGE_END=$(python3 -c "import json; d=json.load(open('/tmp/range-test/range_info.json')); print(d['range_end'])")

          STEP_START=$(date +%s%N)
          curl -s -o "$WORK_DIR/apps_range.bin" -r "${FIRST_OFFSET}-${RANGE_END}" "$URL"
          STEP_END=$(date +%s%N)
          RANGE_FILE_SIZE=$(stat -c%s "$WORK_DIR/apps_range.bin")
          echo "Downloaded $((RANGE_FILE_SIZE / 1048576)) MB in $(( (STEP_END - STEP_START) / 1000000 ))ms"

          # Step 4: Extract source ZIPs from the partial download using Python
          echo ""
          echo "--- Step 4: Extract source ZIPs ---"
          STEP_START=$(date +%s%N)
          python3 << 'PYEOF'
          import json, struct, zlib, os

          work_dir = "/tmp/range-test"
          extract_dir = f"{work_dir}/extracted"
          os.makedirs(extract_dir, exist_ok=True)

          with open(f"{work_dir}/range_info.json") as f:
              info = json.load(f)

          with open(f"{work_dir}/apps_range.bin", "rb") as f:
              data = f.read()

          first_offset = info['first_offset']
          source_count = 0
          source_total = 0

          for entry in info['app_entries']:
              name = entry['name']
              if not (name.endswith('.Source.zip') or name.endswith('..Source.zip')):
                  continue

              pos = entry['offset'] - first_offset
              if pos + 30 > len(data):
                  continue

              # Read local file header
              name_len = struct.unpack_from('<H', data, pos + 26)[0]
              extra_len = struct.unpack_from('<H', data, pos + 28)[0]
              comp_method = struct.unpack_from('<H', data, pos + 8)[0]
              data_start = pos + 30 + name_len + extra_len

              if data_start + entry['comp_size'] > len(data):
                  print(f"  WARNING: {os.path.basename(name)} extends beyond range, skipping")
                  continue

              comp_data = data[data_start:data_start + entry['comp_size']]

              if comp_method == 0:
                  file_data = comp_data
              elif comp_method == 8:
                  file_data = zlib.decompress(comp_data, -15)
              else:
                  print(f"  WARNING: Unknown compression method {comp_method} for {name}")
                  continue

              out_name = os.path.basename(name)
              out_path = os.path.join(extract_dir, out_name)
              with open(out_path, 'wb') as f:
                  f.write(file_data)

              source_count += 1
              source_total += len(file_data)
              print(f"  Extracted: {out_name} ({len(file_data) / 1048576:.1f} MB)")

          print(f"Extracted {source_count} source ZIPs ({source_total // 1048576} MB total)")
          PYEOF
          STEP_END=$(date +%s%N)
          echo "Extraction took $(( (STEP_END - STEP_START) / 1000000 ))ms"

          OVERALL_END=$(date +%s%N)
          OVERALL_MS=$(( (OVERALL_END - OVERALL_START) / 1000000 ))
          OVERALL_SEC=$((OVERALL_MS / 1000))
          OVERALL_MS_REM=$((OVERALL_MS % 1000))

          echo ""
          echo "=========================================="
          echo "  RANGE REQUEST TOTAL TIME: ${OVERALL_SEC}.${OVERALL_MS_REM}s"
          echo "  Downloaded: $((RANGE_FILE_SIZE / 1048576)) MB (vs $((TOTAL_SIZE / 1048576)) MB full)"
          echo "=========================================="

      - name: Print summary
        shell: bash
        run: |
          echo ""
          echo "=========================================="
          echo "  BENCHMARK COMPLETE"
          echo "  Compare the times above:"
          echo "  - Benchmark 1: Full Download-Artifacts"
          echo "  - Benchmark 2: Range request + extract"
          echo "=========================================="
